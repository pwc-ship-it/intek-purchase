<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인텍플러스 구매관리 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --success: #34a853;
            --warning: #f9ab00;
            --danger: #ea4335;
            --bg: #f0f2f5;
            --card: #ffffff;
            --border: #e8eaed;
            --text: #202124;
            --text-muted: #5f6368;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Malgun Gothic', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text);
        }
        .container {
            max-width: 1100px;
            margin: auto;
            background: var(--card);
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        h1 {
            color: var(--primary);
            text-align: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 16px;
            margin-top: 0;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            padding: 12px 20px;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }
        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .upload-card {
            border: 3px dashed var(--primary);
            background: #f8fbff;
            padding: 48px 24px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-card:hover,
        .upload-card.dragover {
            background: #e8f0fe;
        }
        .upload-card h3 { margin: 0 0 16px 0; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { opacity: 0.9; }
        .btn-danger { background: var(--danger); color: white; padding: 6px 12px; font-size: 12px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading {
            display: none;
            color: var(--warning);
            font-weight: bold;
            text-align: center;
            margin: 16px 0;
        }
        .loading.show { display: block; }
        .info-header {
            background: #f8f9fa;
            padding: 16px 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            gap: 32px;
            font-weight: 600;
            border-left: 4px solid var(--primary);
            flex-wrap: wrap;
        }
        .info-header.show { display: flex; }
        .info-header span.value { color: var(--primary); margin-left: 6px; }
        .table-wrapper {
            overflow-x: auto;
            margin-top: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        th, td {
            border-bottom: 1px solid var(--border);
            padding: 10px 12px;
            text-align: center;
            font-size: 14px;
        }
        th {
            background-color: #5f6368;
            color: white;
            font-weight: 600;
        }
        tbody tr:hover { background: #fafbfc; }
        input.cell {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid transparent;
            border-radius: 4px;
            text-align: center;
            font-size: 13px;
            background: transparent;
        }
        input.cell:focus {
            outline: none;
            border-color: var(--primary);
            background: #f8fbff;
        }
        .action-bar {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }
        .action-bar .btn { padding: 12px 24px; font-size: 15px; }
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            background: var(--text);
            color: white;
            padding: 14px 20px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            z-index: 9999;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s;
            max-width: 400px;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .filter-bar input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            flex: 1;
            min-width: 180px;
        }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🛒 인텍플러스 구매 관리</h1>

    <div class="tabs">
        <button class="tab active" data-tab="upload">📄 품의서 업로드</button>
        <button class="tab" data-tab="history">📋 저장된 구매 리스트</button>
    </div>

    <div id="tab-upload" class="tab-content active">
        <div class="upload-card" id="dropZone">
            <h3>📄 품의서 HTML 파일을 드래그하거나 클릭하세요</h3>
            <button class="btn btn-primary" type="button">파일 선택</button>
            <input type="file" id="fileInput" accept=".html,.htm" style="display: none;">
            <div id="loading" class="loading">🚀 Gemini가 데이터를 분석 중입니다...</div>
        </div>

        <div id="infoArea" class="info-header">
            <div>문서번호: <span class="value" id="doc_no">-</span></div>
            <div>신청자: <span class="value" id="doc_requester">-</span></div>
            <div>품목 수: <span class="value" id="item_count">0</span></div>
        </div>

        <div class="table-wrapper" id="resultWrapper" style="display:none;">
            <table>
                <thead>
                    <tr>
                        <th style="width:18%">프로젝트명</th>
                        <th style="width:12%">코드</th>
                        <th style="width:25%">품명</th>
                        <th style="width:25%">규격</th>
                        <th style="width:10%">수량</th>
                        <th style="width:10%">작업</th>
                    </tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>
        </div>

        <div class="action-bar" id="actionBar" style="display:none;">
            <button class="btn btn-primary" id="addRowBtn">+ 행 추가</button>
            <button class="btn btn-success" id="saveBtn">✅ 데이터베이스에 저장</button>
        </div>
    </div>

    <div id="tab-history" class="tab-content">
        <div class="filter-bar">
            <input type="text" id="searchDoc" placeholder="🔍 문서번호 검색">
            <input type="text" id="searchName" placeholder="🔍 품명 검색">
            <button class="btn btn-primary" id="refreshBtn">새로고침</button>
        </div>
        <div id="historyContent">
            <div class="empty-state">조회 버튼을 눌러 저장된 데이터를 불러오세요.</div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ==========================================================
// 🔧 Supabase 설정 — 아래 두 줄만 본인 값으로 교체하세요
// ==========================================================
const SUPABASE_URL = 'https://kiyztxxvynsrjusqlirt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpeXp0eHh2eW5zcmp1c3FsaXJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MzEwOTksImV4cCI6MjA5MjMwNzA5OX0.26rUt3fnWIKrTa_lQiIphaMO6ggoXAswhEE1g9iZ7_Y';
// ==========================================================

(function () {
    'use strict';

    const TABLE_NAME = 'purchase_items';

    // Supabase 클라이언트 초기화
    let sb = null;
    try {
        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) {
        console.error('Supabase 초기화 실패:', e);
    }

    // 상태
    let currentDocNo = '';
    let currentUser = '';

    // DOM
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const loading = document.getElementById('loading');
    const infoArea = document.getElementById('infoArea');
    const resultWrapper = document.getElementById('resultWrapper');
    const resultBody = document.getElementById('resultBody');
    const actionBar = document.getElementById('actionBar');
    const addRowBtn = document.getElementById('addRowBtn');
    const saveBtn = document.getElementById('saveBtn');
    const refreshBtn = document.getElementById('refreshBtn');

    // --- 탭 ---
    document.querySelectorAll('.tab').forEach(function (tab) {
        tab.addEventListener('click', function () {
            document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
            document.querySelectorAll('.tab-content').forEach(function (c) { c.classList.remove('active'); });
            tab.classList.add('active');
            document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            if (tab.dataset.tab === 'history') loadHistory();
        });
    });

    // --- 드래그앤드롭 ---
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(function (ev) {
        window.addEventListener(ev, function (e) { e.preventDefault(); e.stopPropagation(); }, false);
    });
    dropZone.addEventListener('dragover', function () { dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', function () { dropZone.classList.remove('dragover'); });
    dropZone.addEventListener('drop', function (e) {
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    dropZone.addEventListener('click', function (e) {
        if (e.target.tagName !== 'INPUT') fileInput.click();
    });
    fileInput.addEventListener('change', function (e) {
        if (e.target.files.length) handleFile(e.target.files[0]);
    });

    // --- 버튼 이벤트 ---
    addRowBtn.addEventListener('click', function () { appendRow({}); });
    saveBtn.addEventListener('click', saveToSupabase);
    refreshBtn.addEventListener('click', loadHistory);

    // --- 파일 처리 ---
    async function handleFile(file) {
        loading.classList.add('show');
        try {
            const html = await file.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const cleanText = (doc.body ? doc.body.innerText : '').replace(/\s+/g, ' ').trim();

            if (!cleanText) throw new Error('HTML에서 텍스트를 추출할 수 없습니다.');

            const res = await fetch('/api/extract', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: cleanText })
            });

            const data = await res.json();
            if (!res.ok) throw new Error(data.error || ('서버 오류 (' + res.status + ')'));

            renderData(data);
            showToast(data.items.length + '개 품목이 추출되었습니다.', 'success');
        } catch (err) {
            console.error(err);
            showToast('⚠️ 분석 에러: ' + err.message, 'error');
        } finally {
            loading.classList.remove('show');
            fileInput.value = '';
        }
    }

    // --- 테이블 렌더링 ---
    function renderData(data) {
        currentDocNo = data.doc_no || '';
        currentUser = data.user || '';
        document.getElementById('doc_no').innerText = currentDocNo || '-';
        document.getElementById('doc_requester').innerText = currentUser || '-';
        document.getElementById('item_count').innerText = data.items.length;
        infoArea.classList.add('show');

        resultBody.innerHTML = '';
        (data.items || []).forEach(function (item) { appendRow(item); });
        resultWrapper.style.display = 'block';
        actionBar.style.display = 'flex';
    }

    function appendRow(item) {
        item = item || {};
        const tr = document.createElement('tr');
        tr.innerHTML =
            '<td><input class="cell" data-k="p_name" value="' + escapeHtml(item.p_name || '') + '"></td>' +
            '<td><input class="cell" data-k="p_code" value="' + escapeHtml(item.p_code || '') + '"></td>' +
            '<td><input class="cell" data-k="name" value="' + escapeHtml(item.name || '') + '"></td>' +
            '<td><input class="cell" data-k="spec" value="' + escapeHtml(item.spec || '') + '"></td>' +
            '<td><input class="cell" data-k="qty" type="number" min="0" value="' + (item.qty || 0) + '"></td>' +
            '<td><button class="btn btn-danger" type="button">삭제</button></td>';
        // 삭제 버튼
        tr.querySelector('.btn-danger').addEventListener('click', function () {
            tr.remove();
            updateCount();
        });
        resultBody.appendChild(tr);
        updateCount();
    }

    function updateCount() {
        document.getElementById('item_count').innerText = resultBody.querySelectorAll('tr').length;
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    // --- 저장 (중복 문서번호면 거부) ---
    async function saveToSupabase() {
        if (!sb) {
            showToast('Supabase 연결이 설정되지 않았습니다.', 'error');
            return;
        }
        if (!currentDocNo) {
            showToast('문서번호가 비어 있습니다.', 'error');
            return;
        }
        const rows = resultBody.querySelectorAll('tr');
        if (rows.length === 0) {
            showToast('저장할 품목이 없습니다.', 'error');
            return;
        }

        saveBtn.disabled = true;
        try {
            // 1) 중복 검사
            const check = await sb
                .from(TABLE_NAME)
                .select('id', { count: 'exact', head: true })
                .eq('doc_no', currentDocNo);

            if (check.error) throw check.error;

            if (check.count && check.count > 0) {
                showToast('⚠️ 문서번호가 중복되어 업로드 되지 않습니다. (' + currentDocNo + ')', 'error');
                return;
            }

            // 2) 데이터 구성
            const items = Array.from(rows).map(function (tr) {
                const obj = {
                    doc_no: currentDocNo,
                    requester: currentUser,
                    uploaded_at: new Date().toISOString()
                };
                tr.querySelectorAll('.cell').forEach(function (inp) {
                    const k = inp.dataset.k;
                    obj[k] = (k === 'qty') ? (Number(inp.value) || 0) : inp.value.trim();
                });
                return obj;
            });

            // 3) 삽입
            const ins = await sb.from(TABLE_NAME).insert(items);
            if (ins.error) {
                if (ins.error.code === '23505') {
                    showToast('⚠️ 문서번호가 중복되어 업로드 되지 않습니다. (' + currentDocNo + ')', 'error');
                    return;
                }
                throw ins.error;
            }

            showToast('✅ ' + items.length + '건이 저장되었습니다. (문서: ' + currentDocNo + ')', 'success');
        } catch (err) {
            console.error(err);
            showToast('❌ 저장 실패: ' + (err.message || err), 'error');
        } finally {
            saveBtn.disabled = false;
        }
    }

    // --- 조회 ---
    async function loadHistory() {
        const historyContent = document.getElementById('historyContent');
        if (!sb) {
            historyContent.innerHTML = '<div class="empty-state">Supabase 연결이 설정되지 않았습니다.</div>';
            return;
        }
        historyContent.innerHTML = '<div class="empty-state">⏳ 불러오는 중...</div>';

        const docQuery = document.getElementById('searchDoc').value.trim();
        const nameQuery = document.getElementById('searchName').value.trim();

        try {
            let query = sb.from(TABLE_NAME).select('*').order('uploaded_at', { ascending: false }).limit(500);
            if (docQuery) query = query.ilike('doc_no', '%' + docQuery + '%');
            if (nameQuery) query = query.ilike('name', '%' + nameQuery + '%');

            const { data, error } = await query;
            if (error) throw error;

            if (!data || data.length === 0) {
                historyContent.innerHTML = '<div class="empty-state">저장된 데이터가 없습니다.</div>';
                return;
            }

            let html = '<div class="table-wrapper"><table><thead><tr>' +
                '<th>문서번호</th><th>신청자</th><th>프로젝트명</th><th>코드</th>' +
                '<th>품명</th><th>규격</th><th>수량</th><th>업로드일시</th>' +
                '</tr></thead><tbody>';
            data.forEach(function (row) {
                html += '<tr>' +
                    '<td>' + escapeHtml(row.doc_no || '') + '</td>' +
                    '<td>' + escapeHtml(row.requester || '') + '</td>' +
                    '<td>' + escapeHtml(row.p_name || '') + '</td>' +
                    '<td>' + escapeHtml(row.p_code || '') + '</td>' +
                    '<td>' + escapeHtml(row.name || '') + '</td>' +
                    '<td>' + escapeHtml(row.spec || '') + '</td>' +
                    '<td>' + (row.qty || 0) + '</td>' +
                    '<td>' + (row.uploaded_at ? new Date(row.uploaded_at).toLocaleString('ko-KR') : '') + '</td>' +
                    '</tr>';
            });
            html += '</tbody></table></div>';
            html += '<p style="margin-top:12px;color:var(--text-muted);font-size:13px;">총 ' + data.length + '건</p>';
            historyContent.innerHTML = html;
        } catch (err) {
            console.error(err);
            historyContent.innerHTML = '<div class="empty-state" style="color:var(--danger);">❌ 조회 실패: ' + escapeHtml(err.message || String(err)) + '</div>';
        }
    }

    // --- 토스트 ---
    let toastTimer;
    function showToast(msg, type) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = 'toast show ' + (type || '');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function () { toast.classList.remove('show'); }, 3500);
    }
})();
</script>
</body>
</html>
