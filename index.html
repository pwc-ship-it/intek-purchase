<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>인텍플러스 구매 관리 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f9; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #0056b3; text-align: center; }
        .drop-zone { border: 2px dashed #0056b3; padding: 40px; text-align: center; border-radius: 10px; background: #fdfdfd; cursor: pointer; transition: 0.3s; }
        .drop-zone.dragover { background: #e3f2fd; border-color: #0d47a1; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 13px; }
        th { background: #0056b3; color: white; }
        input { width: 90%; border: 1px solid #ccc; padding: 5px; border-radius: 4px; text-align: center; }
        #loading { display: none; color: #d32f2f; font-weight: bold; margin: 10px 0; }
        .btn-save { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 6px; font-size: 16px; margin-top: 20px; cursor: pointer; display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>🛒 인텍플러스 구매 요청 관리</h1>
    <div id="dropZone" class="drop-zone">📄 HTML 파일을 드래그하거나 클릭하여 업로드하세요.</div>
    <input type="file" id="fileInput" accept=".html" style="display:none;">
    <div id="loading">🚀 제미가 데이터를 꼼꼼하게 읽는 중입니다...</div>
    
    <div id="resultInfo" style="margin-top:20px; font-weight:bold; display:none;">
        문서번호: <span id="res_doc_no">-</span> | 신청자: <span id="res_user">-</span>
    </div>
    
    <table>
        <thead><tr><th>프로젝트명</th><th>프로젝트 코드</th><th>품명</th><th>규격</th><th>수량</th></tr></thead>
        <tbody id="resultBody"></tbody>
    </table>
    <button id="saveBtn" class="btn-save" onclick="saveToSupabase()">✅ 데이터베이스에 저장하기</button>
</div>

<script>
    const GEMINI_API_KEY = "AIzaSyCESLSwHsIzSlnKbnpEE7dJQugxHCWPMis";
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('dragover');
    dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); };
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    async function handleFile(file) {
        if (!file) return;
        document.getElementById('loading').style.display = 'block';
        const reader = new FileReader();
        reader.onload = async (e) => {
            const htmlContent = e.target.result;
            // 결재선 등 불필요한 태그를 제외하고 데이터가 밀집된 표 내용만 추출
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlContent, 'text/html');
            const cleanText = doc.body.innerText.replace(/\s\s+/g, ' ').substring(0, 5000);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Extract JSON (doc_no, user, items:[{p_name, p_code, name, spec, qty}]). Data: ${cleanText}` }] }]
                    })
                });

                const res = await response.json();
                const aiResponse = res.candidates[0].content.parts[0].text;
                const jsonMatch = aiResponse.match(/\{.*\}/s);
                if (!jsonMatch) throw new Error("JSON 추출 실패");
                const data = JSON.parse(jsonMatch[0]);

                document.getElementById('res_doc_no').innerText = data.doc_no || "-";
                document.getElementById('res_user').innerText = data.user || "-";
                document.getElementById('resultInfo').style.display = 'block';

                const tbody = document.getElementById('resultBody');
                tbody.innerHTML = '';
                data.items.forEach((item, i) => {
                    tbody.innerHTML += `<tr>
                        <td><input type="text" id="p_name_${i}" value="${item.p_name || ''}"></td>
                        <td><input type="text" id="p_code_${i}" value="${item.p_code || ''}"></td>
                        <td><input type="text" id="name_${i}" value="${item.name || ''}"></td>
                        <td><input type="text" id="spec_${i}" value="${item.spec || ''}"></td>
                        <td><input type="number" id="qty_${i}" value="${item.qty || 0}"></td>
                    </tr>`;
                });
                document.getElementById('saveBtn').style.display = 'block';
            } catch (err) {
                alert("분석 중 오류: " + err.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
