<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>인텍플러스 구매 요청 관리</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f4f7f9; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .upload-box { border: 3px dashed #1a73e8; background: #f8fbff; padding: 40px; text-align: center; border-radius: 10px; cursor: pointer; }
        .upload-box.hover { background: #e8f0fe; border-color: #174ea6; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 13px; }
        th { background: #1a73e8; color: white; }
        .loading { display: none; color: #f9ab00; font-weight: bold; text-align: center; margin: 15px 0; }
        .btn-save { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; display: none; }
        input { width: 90%; border: 1px solid #ccc; padding: 4px; text-align: center; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: #333;">인텍플러스 구매 요청 분석기</h2>
    <div id="dropZone" class="upload-box">📄 HTML 파일을 드래그하거나 클릭하여 업로드하세요.</div>
    <input type="file" id="fileInput" accept=".html" style="display:none;">
    <div id="loading" class="loading">⚙️ AI가 불필요한 코드를 제거하고 데이터를 분석 중입니다...</div>

    <div id="summary" style="display:none; background:#eee; padding:10px; margin-top:20px; border-radius:5px;">
        <b>문서번호:</b> <span id="res_doc_no"></span> | <b>신청자:</b> <span id="res_user"></span>
    </div>

    <table>
        <thead><tr><th>프로젝트명</th><th>프로젝트 코드</th><th>품명</th><th>규격</th><th>수량</th></tr></thead>
        <tbody id="resultBody"></tbody>
    </table>
    <button id="saveBtn" class="btn-save" onclick="saveToSupabase()">✅ 데이터베이스 저장</button>
</div>

<script>
    const API_KEY = "AIzaSyCESLSwHsIzSlnKbnpEE7dJQugxHCWPMis";
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    // 드래그앤드롭 방어
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
        window.addEventListener(e, (ev) => { ev.preventDefault(); ev.stopPropagation(); }, false);
    });

    dropZone.addEventListener('dragover', () => dropZone.classList.add('hover'));
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
    dropZone.addEventListener('drop', (e) => {
        dropZone.classList.remove('hover');
        if (e.dataTransfer.files.length) startAnalysis(e.dataTransfer.files[0]);
    });

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => { if(e.target.files.length) startAnalysis(e.target.files[0]); };

    async function startAnalysis(file) {
        document.getElementById('loading').style.display = 'block';
        const html = await file.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        
        // [세척] 스타일, 스크립트 제거 후 오직 표(Table) 데이터만 수집
        doc.querySelectorAll('style, script').forEach(el => el.remove());
        const tables = Array.from(doc.querySelectorAll('table')).map(t => t.innerText.trim()).join('\n');
        const cleanContent = tables.substring(0, 5000); // AI가 읽기 좋은 길이로 조정

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Please extract purchase items from this text into JSON: {doc_no, user, items:[{p_name, p_code, name, spec, qty}]}. Text: ${cleanContent}` }] }]
                })
            });

            const res = await response.json();
            if (!res.candidates) throw new Error("AI 분석 실패 (응답 없음)");

            const aiText = res.candidates[0].content.parts[0].text;
            const jsonStr = aiText.match(/\{[\s\S]*\}/)[0];
            const data = JSON.parse(jsonStr);

            document.getElementById('res_doc_no').innerText = data.doc_no || "-";
            document.getElementById('res_user').innerText = data.user || "-";
            document.getElementById('summary').style.display = 'block';

            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = '';
            data.items.forEach((item, i) => {
                tbody.innerHTML += `<tr>
                    <td><input type="text" id="p_name_${i}" value="${item.p_name||''}"></td>
                    <td><input type="text" id="p_code_${i}" value="${item.p_code||''}"></td>
                    <td><input type="text" id="name_${i}" value="${item.name||''}"></td>
                    <td><input type="text" id="spec_${i}" value="${item.spec||''}"></td>
                    <td><input type="number" id="qty_${i}" value="${item.qty||0}"></td>
                </tr>`;
            });
            document.getElementById('saveBtn').style.display = 'block';
        } catch (err) {
            console.error(err);
            alert("분석 중 오류가 발생했습니다. 파일 형식을 확인해주세요.");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }
</script>
</body>
</html>
