<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>인텍플러스 구매관리 시스템 (HTML 분석형)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f4f7f9; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        .input-area { margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; padding: 10px; border: 2px solid #ddd; border-radius: 8px; resize: none; }
        .info-header { background: #eef2f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 30px; font-weight: bold; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
        th { background-color: #34495e; color: white; }
        .btn { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-parse { background-color: #3498db; color: white; width: 100%; margin-top: 10px; font-size: 16px; }
        .btn-save { background-color: #2ecc71; color: white; width: 100%; margin-top: 20px; font-size: 18px; }
        input { width: 95%; padding: 5px; border: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>인텍플러스 구매 관리 시스템 (HTML)</h1>
    
    <div class="input-area">
        <p><strong>💡 사용법:</strong> 품의서 화면에서 '소스 보기' 또는 'HTML 복사' 후 아래에 붙여넣어 주세요.</p>
        <textarea id="htmlInput" placeholder="여기에 HTML 소스를 붙여넣으세요..."></textarea>
        <button class="btn btn-parse" onclick="processHTML()">데이터 즉시 추출</button>
    </div>

    <div class="info-header">
        <div>문서번호: <span id="doc_no">-</span></div>
        <div>기안일자: <span id="doc_date">-</span></div>
        <div>신청자: <span id="doc_requester">-</span></div>
    </div>

    <table>
        <thead>
            <tr><th>프로젝트명</th><th>프로젝트 코드</th><th>구매요청번호</th><th>품명</th><th>규격</th><th>수량</th></tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>

    <button id="saveBtn" class="btn btn-save" style="display:none;" onclick="saveToDB()">데이터베이스에 저장하기</button>
</div>

<script>
    const SUPABASE_URL = "https://kiyztxxvynsrjusqlirt.supabase.co/rest/v1/";
    const SUPABASE_KEY = "sb_publishable_CY7UqYJoq4kY1JfpuFY72g_PAWZFgTT";
    const GEMINI_API_KEY = "AIzaSyCESLSwHsIzSlnKbnpEE7dJQugxHCWPMis";

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function processHTML() {
        const htmlContent = document.getElementById('htmlInput').value;
        if (!htmlContent) return alert("HTML 소스를 입력해 주세요.");

        try {
            // 이미지가 아니므로 'gemini-1.5-flash' 모델에 텍스트만 전달하여 초고속 처리
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: "Extract data from this HTML into JSON. I need 'doc_no', 'date', 'user', and 'items' list with 'p_name', 'p_code', 'prq', 'name', 'spec', 'qty'. Return ONLY JSON. HTML: " + htmlContent }]
                    }]
                })
            });

            const result = await response.json();
            let aiText = result.candidates[0].content.parts[0].text;
            const data = JSON.parse(aiText.replace(/```json/g, "").replace(/```/g, ""));

            // 상단 정보 업데이트
            document.getElementById('doc_no').innerText = data.doc_no || "-";
            document.getElementById('doc_date').innerText = data.date || "-";
            document.getElementById('doc_requester').innerText = data.user || "-";

            // 테이블 업데이트
            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = '';
            data.items.forEach((item, i) => {
                tbody.innerHTML += `<tr>
                    <td><input id="p_name_${i}" value="${item.p_name}"></td>
                    <td><input id="p_code_${i}" value="${item.p_code}"></td>
                    <td><input id="prq_${i}" value="${item.prq}"></td>
                    <td><input id="name_${i}" value="${item.name}"></td>
                    <td><input id="spec_${i}" value="${item.spec}"></td>
                    <td><input type="number" id="qty_${i}" value="${item.qty}"></td>
                </tr>`;
            });
            document.getElementById('saveBtn').style.display = 'block';
        } catch (e) {
            alert("분석 실패: " + e.message);
        }
    }

    async function saveToDB() {
        // 기존 저장 로직과 동일
        const rows = document.getElementById('resultBody').children;
        const dataToSave = [];
        for (let i = 0; i < rows.length; i++) {
            dataToSave.push({
                project_name: document.getElementById(`p_name_${i}`).value,
                project_code: document.getElementById(`p_code_${i}`).value,
                prq_no: document.getElementById(`prq_${i}`).value,
                item_name: document.getElementById(`name_${i}`).value,
                spec: document.getElementById(`spec_${i}`).value,
                quantity: parseInt(document.getElementById(`qty_${i}`).value) || 0
            });
        }
        const { error } = await _supabase.from('purchase_history').insert(dataToSave);
        if (error) alert("저장 실패!"); else alert("성공적으로 저장되었습니다!");
    }
</script>
</body>
</html>
