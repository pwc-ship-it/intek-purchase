<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인텍플러스 구매관리 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f8f9fa; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .upload-card { border: 2px dashed #3498db; background: #ebf5fb; padding: 40px; text-align: center; border-radius: 10px; margin-bottom: 20px; cursor: pointer; }
        .info-header { background: #f1f4f6; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 20px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: center; }
        th { background-color: #34495e; color: white; }
        .btn { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-scan { background-color: #3498db; color: white; margin-top: 15px; width: 220px; }
        .btn-save { background-color: #27ae60; color: white; width: 100%; margin-top: 25px; font-size: 18px; }
        #loading { display: none; font-weight: bold; color: #e67e22; margin: 20px 0; }
        input { width: 90%; padding: 5px; text-align: center; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <h1>인텍플러스 구매 관리 시스템 (품의서 스캔)</h1>
    <div class="upload-card">
        <h3>AS(무상)품의서 사진 업로드</h3>
        <input type="file" id="imageInput" accept="image/*"><br>
        <button class="btn btn-scan" onclick="processAI()">AI 자동 데이터 추출</button>
        <div id="loading">🚀 AI 분석 진행 중... (최대 15초 소요)</div>
    </div>

    <div class="info-header">
        <div>문서번호: <span id="doc_no">-</span></div>
        <div>기안일자: <span id="doc_date">-</span></div>
        <div>신청자: <span id="doc_requester">-</span></div>
    </div>

    <table>
        <thead>
            <tr><th>프로젝트명</th><th>프로젝트 코드</th><th>구매요청번호</th><th>품명</th><th>규격</th><th>수량</th></tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
    <button id="saveBtn" class="btn btn-save" style="display:none;" onclick="saveData()">최종 저장하기</button>
</div>

<script>
    const SUPABASE_URL = "https://kiyztxxvynsrjusqlirt.supabase.co/rest/v1/";
    const SUPABASE_KEY = "sb_publishable_CY7UqYJoq4kY1JfpuFY72g_PAWZFgTT";
    const GEMINI_API_KEY = "AIzaSyCESLSwHsIzSlnKbnpEE7dJQugxHCWPMis";

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function processAI() {
        const fileInput = document.getElementById('imageInput');
        if (!fileInput.files[0]) return alert("파일을 선택해 주세요.");

        document.getElementById('loading').style.display = 'block';
        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onloadend = async () => {
            const base64Data = reader.result.split(',')[1];
            try {
                // 모델을 'gemini-1.5-flash'로 고정하고, 안전성 필터를 끔
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Extract '문서번호', '기안일자', '신청자' and the table items ('프로젝트명', '프로젝트코드', '구매요청번호', '품명', '규격', '수량') from this image. Return ONLY a valid JSON object: {\"doc_no\":\"\", \"date\":\"\", \"user\":\"\", \"items\":[{\"p_name\":\"\", \"p_code\":\"\", \"prq\":\"\", \"name\":\"\", \"spec\":\"\", \"qty\":0}]}" },
                                { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                            ]
                        }],
                        safetySettings: [{ "category": "HARM_CATEGORY_HARASSMENT", "threshold": "BLOCK_NONE" }]
                    })
                });

                const result = await response.json();
                if (!result.candidates || result.candidates.length === 0) {
                    throw new Error("AI가 이미지를 거부했습니다. 다른 사진으로 시도하거나 API 키를 확인해주세요.");
                }

                const aiText = result.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, "");
                const data = JSON.parse(aiText);

                document.getElementById('doc_no').innerText = data.doc_no || "-";
                document.getElementById('doc_date').innerText = data.date || "-";
                document.getElementById('doc_requester').innerText = data.user || "-";

                const tbody = document.getElementById('resultBody');
                tbody.innerHTML = '';
                data.items.forEach((item, i) => {
                    tbody.innerHTML += `<tr>
                        <td><input id="p_name_${i}" value="${item.p_name}"></td>
                        <td><input id="p_code_${i}" value="${item.p_code}"></td>
                        <td><input id="prq_${i}" value="${item.prq}"></td>
                        <td><input id="name_${i}" value="${item.name}"></td>
                        <td><input id="spec_${i}" value="${item.spec}"></td>
                        <td><input type="number" id="qty_${i}" value="${item.qty}"></td>
                    </tr>`;
                });
                document.getElementById('saveBtn').style.display = 'block';
            } catch (e) {
                alert("분석 실패: " + e.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        };
    }

    async function saveData() {
        const rows = document.getElementById('resultBody').children;
        const dataToSave = [];
        for (let i = 0; i < rows.length; i++) {
            dataToSave.push({
                project_name: document.getElementById(`p_name_${i}`).value,
                project_code: document.getElementById(`p_code_${i}`).value,
                prq_no: document.getElementById(`prq_${i}`).value,
                item_name: document.getElementById(`name_${i}`).value,
                spec: document.getElementById(`spec_${i}`).value,
                quantity: parseInt(document.getElementById(`qty_${i}`).value) || 0,
                status: '입고대기'
            });
        }
        const { error } = await _supabase.from('purchase_history').insert(dataToSave);
        if (error) alert("저장 실패: " + error.message);
        else alert("DB에 성공적으로 저장되었습니다!");
    }
</script>
</body>
</html>
