<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>인텍플러스 구매관리 시스템 (최종 보강)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f0f2f5; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-align: center; border-bottom: 2px solid #e8eaed; padding-bottom: 15px; }
        .upload-card { border: 3px dashed #1a73e8; background: #f8fbff; padding: 40px; text-align: center; border-radius: 15px; cursor: pointer; }
        .upload-card.dragover { background: #e8f0fe; transform: scale(1.01); }
        .info-header { background: #f8f9fa; padding: 18px; border-radius: 10px; margin-top: 20px; display: flex; gap: 40px; font-weight: bold; border-left: 5px solid #1a73e8; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #e8eaed; padding: 12px; text-align: center; }
        th { background-color: #5f6368; color: white; }
        .loading { display: none; color: #f9ab00; font-weight: bold; text-align: center; margin: 15px 0; }
        .btn-save { background-color: #34a853; color: white; width: 100%; margin-top: 30px; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; display: none; }
        input { width: 90%; padding: 6px; border: 1px solid #dadce0; border-radius: 4px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛒 인텍플러스 구매 관리</h1>
    <div class="upload-card" id="dropZone">
        <h3>📄 품의서 HTML 파일을 드래그하거나 클릭하세요</h3>
        <button style="padding:10px 20px; cursor:pointer;">파일 선택</button>
        <input type="file" id="fileInput" accept=".html" style="display: none;">
        <div id="loading" class="loading">🚀 제미가 데이터를 정밀 분석 중입니다...</div>
    </div>

    <div id="infoArea" class="info-header" style="display:none;">
        <div>문서번호: <span id="doc_no" style="color:#1a73e8">-</span></div>
        <div>신청자: <span id="doc_requester" style="color:#1a73e8">-</span></div>
    </div>

    <table>
        <thead><tr><th>프로젝트명</th><th>코드</th><th>품명</th><th>규격</th><th>수량</th></tr></thead>
        <tbody id="resultBody"></tbody>
    </table>

    <button id="saveBtn" class="btn-save" onclick="saveToSupabase()">✅ 데이터베이스 저장 완료</button>
</div>

<script>
    const API_KEY = "AIzaSyCESLSwHsIzSlnKbnpEE7dJQugxHCWPMis";
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    // 드래그앤드롭 이벤트 방어 (새창 열림 방지)
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
        window.addEventListener(e, (ev) => { ev.preventDefault(); ev.stopPropagation(); }, false);
    });

    dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => { if(e.target.files.length) handleFile(e.target.files[0]); };

    async function handleFile(file) {
        document.getElementById('loading').style.display = 'block';
        const html = await file.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        
        // 데이터 세척: 텍스트만 뽑아서 AI의 부담을 줄여줌
        const cleanText = doc.body.innerText.replace(/\s+/g, ' ').substring(0, 7000);

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Extract data to JSON format { "doc_no": "", "user": "", "items": [{ "p_name": "", "p_code": "", "name": "", "spec": "", "qty": 0 }] }. ONLY JSON output. Data: ${cleanText}` }] }]
                })
            });

            const resData = await response.json();
            
            // 핵심: candidates가 없을 경우에 대한 방어 로직
            if (!resData.candidates || !resData.candidates[0]) {
                throw new Error("AI 서버가 응답하지 않습니다. 잠시 후 다시 시도해 주세요.");
            }

            let aiText = resData.candidates[0].content.parts[0].text;
            
            // 핵심: AI가 잡다한 말을 섞어도 JSON 본체만 추출하는 정규식
            const jsonMatch = aiText.match(/\{[\s\S]*\}/);
            if (!jsonMatch) throw new Error("데이터 추출 형식에 오류가 있습니다.");
            
            const data = JSON.parse(jsonMatch[0]);

            document.getElementById('doc_no').innerText = data.doc_no || "-";
            document.getElementById('doc_requester').innerText = data.user || "-";
            document.getElementById('infoArea').style.display = 'flex';

            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = '';
            (data.items || []).forEach((item, i) => {
                tbody.innerHTML += `<tr>
                    <td><input type="text" id="p_name_${i}" value="${item.p_name||''}"></td>
                    <td><input type="text" id="p_code_${i}" value="${item.p_code||''}"></td>
                    <td><input type="text" id="name_${i}" value="${item.name||''}"></td>
                    <td><input type="text" id="spec_${i}" value="${item.spec||''}"></td>
                    <td><input type="number" id="qty_${i}" value="${item.qty||0}"></td>
                </tr>`;
            });
            document.getElementById('saveBtn').style.display = 'block';
        } catch (err) {
            console.error(err);
            alert("⚠️ 분석 에러: " + err.message);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }
</script>
</body>
</html>
