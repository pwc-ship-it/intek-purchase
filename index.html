<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인텍플러스 구매관리 시스템 (HTML 파일 업로드)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f8f9fa; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 10px; margin-bottom: 30px; }
        .upload-card { border: 2px dashed #3498db; background: #ebf5fb; padding: 40px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .info-header { background: #f1f4f6; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 30px; font-weight: bold; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: center; }
        th { background-color: #34495e; color: white; }
        .btn { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-scan { background-color: #3498db; color: white; font-size: 16px; width: 250px; }
        .btn-save { background-color: #27ae60; color: white; width: 100%; margin-top: 25px; font-size: 18px; }
        #loading { display: none; font-weight: bold; color: #e67e22; margin-top: 15px; }
        input[type="text"], input[type="number"] { width: 90%; padding: 5px; border: 1px solid #ddd; text-align: center; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>인텍플러스 구매 관리 시스템 (HTML 파일 분석)</h1>

    <div class="upload-card">
        <h3>📄 다운로드한 HTML 파일 업로드</h3>
        <p style="color: #666; font-size: 14px;">품의서 HTML 파일을 선택한 후 아래 버튼을 눌러주세요.</p>
        <input type="file" id="fileInput" accept=".html,.htm" style="margin-bottom: 15px;"><br>
        <button class="btn btn-scan" onclick="processHTMLFile()">AI 데이터 추출 시작</button>
        <div id="loading">🚀 HTML 파일을 분석하여 데이터를 추출하고 있습니다...</div>
    </div>

    <div class="info-header">
        <div>문서번호: <span id="doc_no" style="color: #3498db;">-</span></div>
        <div>기안일자: <span id="doc_date" style="color: #3498db;">-</span></div>
        <div>신청자: <span id="doc_requester" style="color: #3498db;">-</span></div>
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>프로젝트명</th>
                <th>프로젝트 코드</th>
                <th>구매요청번호</th>
                <th>품명</th>
                <th>규격</th>
                <th>수량</th>
            </tr>
        </thead>
        <tbody id="resultBody">
            </tbody>
    </table>

    <button id="saveBtn" class="btn btn-save" style="display:none;" onclick="saveToSupabase()">데이터베이스에 최종 저장</button>
</div>

<script>
    // 쵸리님이 설정하신 Supabase 및 Gemini 정보
    const SUPABASE_URL = "https://kiyztxxvynsrjusqlirt.supabase.co/rest/v1/";
    const SUPABASE_KEY = "sb_publishable_CY7UqYJoq4kY1JfpuFY72g_PAWZFgTT";
    const GEMINI_API_KEY = "AIzaSyCESLSwHsIzSlnKbnpEE7dJQugxHCWPMis";

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function processHTMLFile() {
        const fileInput = document.getElementById('fileInput');
        if (!fileInput.files[0]) return alert("분석할 HTML 파일을 선택해 주세요.");

        document.getElementById('loading').style.display = 'block';
        
        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = async (e) => {
            const htmlText = e.target.result;
            
            try {
                // Gemini에게 HTML 텍스트를 전달하여 데이터 추출 (텍스트 방식이라 매우 정확함)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ 
                                text: "Extract data from this purchase request HTML into JSON format. I need 'doc_no', 'date', 'user', and an 'items' array containing 'p_name', 'p_code', 'prq', 'name', 'spec', 'qty'. Return only the pure JSON code. HTML Content: " + htmlText 
                            }]
                        }]
                    })
                });

                const result = await response.json();
                if (!result.candidates) throw new Error("AI 분석 실패");

                let aiResponse = result.candidates[0].content.parts[0].text;
                // JSON만 깔끔하게 추출
                const jsonStr = aiResponse.replace(/```json/g, "").replace(/```/g, "").trim();
                const data = JSON.parse(jsonStr);

                // 화면에 기본 정보 표시
                document.getElementById('doc_no').innerText = data.doc_no || "-";
                document.getElementById('doc_date').innerText = data.date || "-";
                document.getElementById('doc_requester').innerText = data.user || "-";

                // 테이블에 아이템 목록 표시
                const tbody = document.getElementById('resultBody');
                tbody.innerHTML = '';
                
                if (data.items && data.items.length > 0) {
                    data.items.forEach((item, i) => {
                        tbody.innerHTML += `
                            <tr>
                                <td><input type="text" id="p_name_${i}" value="${item.p_name || ''}"></td>
                                <td><input type="text" id="p_code_${i}" value="${item.p_code || ''}"></td>
                                <td><input type="text" id="prq_${i}" value="${item.prq || ''}"></td>
                                <td><input type="text" id="name_${i}" value="${item.name || ''}"></td>
                                <td><input type="text" id="spec_${i}" value="${item.spec || ''}"></td>
                                <td><input type="number" id="qty_${i}" value="${item.qty || 0}"></td>
                            </tr>
                        `;
                    });
                    document.getElementById('saveBtn').style.display = 'block';
                } else {
                    alert("추출된 품목 데이터가 없습니다.");
                }

            } catch (err) {
                alert("파일 분석 중 오류가 발생했습니다: " + err.message);
                console.error(err);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        };

        reader.readAsText(file);
    }

    async function saveToSupabase() {
        const rows = document.getElementById('resultBody').children;
        const dataToSave = [];

        for (let i = 0; i < rows.length; i++) {
            dataToSave.push({
                project_name: document.getElementById(`p_name_${i}`).value,
                project_code: document.getElementById(`p_code_${i}`).value,
                prq_no: document.getElementById(`prq_${i}`).value,
                item_name: document.getElementById(`name_${i}`).value,
                spec: document.getElementById(`spec_${i}`).value,
                quantity: parseInt(document.getElementById(`qty_${i}`).value) || 0,
                status: '입고대기'
            });
        }

        const { error } = await _supabase.from('purchase_history').insert(dataToSave);
        if (error) {
            alert("DB 저장 중 오류 발생: " + error.message);
        } else {
            alert("🎉 성공적으로 데이터베이스에 저장되었습니다!");
        }
    }
</script>

</body>
</html>
