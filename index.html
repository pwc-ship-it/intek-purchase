<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인텍플러스 구매관리 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f8f9fa; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .upload-card { border: 2px dashed #3498db; background: #ebf5fb; padding: 40px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .info-header { background: #f1f4f6; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 20px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #dee2e6; padding: 8px; text-align: center; }
        th { background-color: #34495e; color: white; }
        .btn { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-scan { background-color: #3498db; color: white; }
        .btn-save { background-color: #27ae60; color: white; width: 100%; margin-top: 25px; font-size: 18px; }
        #loading { display: none; font-weight: bold; color: #e67e22; margin-top: 15px; }
        input { width: 90%; padding: 4px; border: 1px solid #ddd; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>인텍플러스 구매 관리 시스템</h1>
    <div class="upload-card">
        <h3>품의서 사진 업로드 (JPG/PNG)</h3>
        <input type="file" id="imageInput" accept="image/*"><br><br>
        <button class="btn btn-scan" onclick="processAI()">AI 자동 데이터 추출 시작</button>
        <div id="loading">🔍 AI가 보안 필터를 우회하여 문서를 분석 중입니다...</div>
    </div>

    <div class="info-header">
        <div>문서번호: <span id="doc_no">-</span></div>
        <div>기안일자: <span id="doc_date">-</span></div>
        <div>신청자: <span id="doc_requester">-</span></div>
    </div>

    <table>
        <thead>
            <tr><th>프로젝트명</th><th>프로젝트 코드</th><th>구매요청번호</th><th>품명</th><th>규격</th><th>수량</th></tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
    <button id="saveBtn" class="btn btn-save" style="display:none;" onclick="saveData()">데이터베이스 저장</button>
</div>

<script>
    const SUPABASE_URL = "https://kiyztxxvynsrjusqlirt.supabase.co/rest/v1/";
    const SUPABASE_KEY = "sb_publishable_CY7UqYJoq4kY1JfpuFY72g_PAWZFgTT";
    const GEMINI_API_KEY = "AIzaSyCESLSwHsIzSlnKbnpEE7dJQugxHCWPMis";

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function processAI() {
        const fileInput = document.getElementById('imageInput');
        if (!fileInput.files[0]) return alert("파일을 선택해 주세요.");

        document.getElementById('loading').style.display = 'block';
        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onloadend = async () => {
            const base64Data = reader.result.split(',')[1];
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Extract all items from this purchase request form. Accuracy is critical. If text is small, zoom in mentally. Output strictly in JSON format like this: {\"doc_no\": \"number\", \"date\": \"yyyy-mm-dd\", \"user\": \"name\", \"items\": [{\"p_name\": \"project\", \"p_code\": \"code\", \"prq\": \"PRQ number\", \"name\": \"item name\", \"spec\": \"specification\", \"qty\": 1}]}. Just give me the JSON, no explanations." },
                                { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                            ]
                        }],
                        // 보안 필터를 완전히 꺼서 내용 차단을 방지합니다.
                        safetySettings: [
                            { "category": "HARM_CATEGORY_HARASSMENT", "threshold": "BLOCK_NONE" },
                            { "category": "HARM_CATEGORY_HATE_SPEECH", "threshold": "BLOCK_NONE" },
                            { "category": "HARM_CATEGORY_SEXUALLY_EXPLICIT", "threshold": "BLOCK_NONE" },
                            { "category": "HARM_CATEGORY_DANGEROUS_CONTENT", "threshold": "BLOCK_NONE" }
                        ]
                    })
                });

                const result = await response.json();
                
                // AI 응답이 비어있는지 체크하는 안전장치
                if (!result.candidates || result.candidates.length === 0 || !result.candidates[0].content) {
                    throw new Error("AI가 이미지에서 텍스트를 추출하지 못했습니다. 조명이나 각도를 바꿔서 다시 찍어보세요.");
                }

                let aiText = result.candidates[0].content.parts[0].text;
                // JSON만 추출하기 위한 정규식 처리
                const jsonMatch = aiText.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error("JSON 형식을 찾을 수 없습니다.");
                
                const data = JSON.parse(jsonMatch[0]);

                // 화면 UI에 데이터 뿌리기
                document.getElementById('doc_no').innerText = data.doc_no || "-";
                document.getElementById('doc_date').innerText = data.date || "-";
                document.getElementById('doc_requester').innerText = data.user || "-";

                const tbody = document.getElementById('resultBody');
                tbody.innerHTML = '';
                if(data.items && data.items.length > 0) {
                    data.items.forEach((item, i) => {
                        tbody.innerHTML += `<tr>
                            <td><input id="p_name_${i}" value="${item.p_name || ''}"></td>
                            <td><input id="p_code_${i}" value="${item.p_code || ''}"></td>
                            <td><input id="prq_${i}" value="${item.prq || ''}"></td>
                            <td><input id="name_${i}" value="${item.name || ''}"></td>
                            <td><input id="spec_${i}" value="${item.spec || ''}"></td>
                            <td><input type="number" id="qty_${i}" value="${item.qty || 0}"></td>
                        </tr>`;
                    });
                    document.getElementById('saveBtn').style.display = 'block';
                } else {
                    alert("품목 데이터를 찾지 못했습니다.");
                }
            } catch (e) {
                alert("분석 실패: " + e.message);
                console.error("상세 에러:", e);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        };
    }

    async function saveData() {
        const rows = document.getElementById('resultBody').children;
        const dataToSave = [];
        for (let i = 0; i < rows.length; i++) {
            dataToSave.push({
                project_name: document.getElementById(`p_name_${i}`).value,
                project_code: document.getElementById(`p_code_${i}`).value,
                prq_no: document.getElementById(`prq_${i}`).value,
                item_name: document.getElementById(`name_${i}`).value,
                spec: document.getElementById(`spec_${i}`).value,
                quantity: parseInt(document.getElementById(`qty_${i}`).value) || 0,
                status: '입고대기'
            });
        }
        const { error } = await _supabase.from('purchase_history').insert(dataToSave);
        if (error) alert("저장 실패: " + error.message);
        else alert("DB 저장 성공!");
    }
</script>
</body>
</html>
