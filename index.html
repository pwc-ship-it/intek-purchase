<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>인텍플러스 구매 요청 분석기</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 30px; background-color: #f8f9fa; }
        .main-box { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .drop-area { border: 3px dashed #1a73e8; background: #f1f8ff; padding: 60px; text-align: center; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .drop-area.active { background: #e8f0fe; border-color: #174ea6; transform: scale(1.02); }
        .status-msg { margin-top: 15px; font-weight: bold; color: #1a73e8; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: center; font-size: 14px; }
        th { background: #1a73e8; color: white; }
        input { width: 90%; border: 1px solid #ced4da; padding: 5px; border-radius: 4px; text-align: center; }
        .save-btn { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; margin-top: 25px; cursor: pointer; display: none; }
    </style>
</head>
<body>
<div class="main-box">
    <h2 style="text-align:center; color:#333;">📦 구매 요청 데이터 자동 추출</h2>
    <div id="dropZone" class="drop-area">📄 여기에 HTML 파일을 끌어다 놓으세요 (또는 클릭)</div>
    <input type="file" id="fileInput" accept=".html" style="display:none;">
    <div id="loading" class="status-msg">🔍 제미가 문서 내용을 정밀 분석 중입니다...</div>

    <div id="infoDisplay" style="margin-top:20px; display:none; padding:10px; background:#e9ecef; border-radius:8px;">
        <strong>문서번호:</strong> <span id="view_doc_no"></span> | <strong>신청자:</strong> <span id="view_user"></span>
    </div>

    <table>
        <thead><tr><th>프로젝트명</th><th>코드</th><th>품명</th><th>규격</th><th>수량</th></tr></thead>
        <tbody id="dataTable"></tbody>
    </table>
    <button id="saveBtn" class="save-btn" onclick="saveToSupabase()">✅ 데이터베이스에 최종 저장</button>
</div>

<script>
    const API_KEY = "AIzaSyCESLSwHsIzSlnKbnpEE7dJQugxHCWPMis";
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    // 드래그앤드롭 철저 방어
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eName => {
        window.addEventListener(eName, e => { e.preventDefault(); e.stopPropagation(); }, false);
    });

    dropZone.addEventListener('dragover', () => dropZone.classList.add('active'));
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('active'));
    dropZone.addEventListener('drop', (e) => {
        dropZone.classList.remove('active');
        const file = e.dataTransfer.files[0];
        if (file) processFile(file);
    });

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => processFile(e.target.files[0]);

    async function processFile(file) {
        document.getElementById('loading').style.display = 'block';
        const text = await file.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        
        // 핵심: 표(Table) 데이터만 쏙 뽑아서 AI에게 전달
        const tables = Array.from(doc.querySelectorAll('table')).map(t => t.innerText).join('\n');
        const summaryText = tables.substring(0, 6000); 

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Extract JSON from PRQ doc: {doc_no, user, items:[{p_name, p_code, name, spec, qty}]}. Only JSON. Data: ${summaryText}` }] }]
                })
            });

            const data = await res.json();
            const rawJson = data.candidates[0].content.parts[0].text.match(/\{[\s\S]*\}/)[0];
            const result = JSON.parse(rawJson);

            // 화면 표시
            document.getElementById('view_doc_no').innerText = result.doc_no || '미확인';
            document.getElementById('view_user').innerText = result.user || '미확인';
            document.getElementById('infoDisplay').style.display = 'block';

            const tbody = document.getElementById('dataTable');
            tbody.innerHTML = '';
            result.items.forEach((item, i) => {
                tbody.innerHTML += `<tr>
                    <td><input type="text" id="p_name_${i}" value="${item.p_name||''}"></td>
                    <td><input type="text" id="p_code_${i}" value="${item.p_code||''}"></td>
                    <td><input type="text" id="name_${i}" value="${item.name||''}"></td>
                    <td><input type="text" id="spec_${i}" value="${item.spec||''}"></td>
                    <td><input type="number" id="qty_${i}" value="${item.qty||0}"></td>
                </tr>`;
            });
            document.getElementById('saveBtn').style.display = 'block';
        } catch (err) {
            alert("분석 실패! 다시 시도해 주세요.");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }
</script>
</body>
</html>
